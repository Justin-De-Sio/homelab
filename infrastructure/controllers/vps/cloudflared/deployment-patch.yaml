apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: cloudflared
          args:
            - tunnel
            - --credentials-file
            - /etc/cloudflared/creds/credentials.json
            - --metrics
            - 0.0.0.0:2000
            - run
            - vps
