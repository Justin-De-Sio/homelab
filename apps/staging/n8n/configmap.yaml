apiVersion: v1
kind: ConfigMap
metadata:
  name: n8n-configmap
data:
  N8N_PORT: "3008"
  N8N_PROTOCOL: "http"
  DB_TYPE: "postgresdb"
  DB_POSTGRESDB_HOST: "n8n-database-rw"
  DB_POSTGRESDB_PORT: "5432"
  DB_POSTGRESDB_DATABASE: "app"
  N8N_SECURE_COOKIE: "false"
  N8N_HOST: "n8n.justindesio.com"
  WEBHOOK_URL: "https://n8n.justindesio.com"
  N8N_EMAIL_MODE: "smtp"
  N8N_SMTP_HOST: "smtp-relay.brevo.com"
  N8N_SMTP_PORT: "587"
  N8N_SMTP_SSL: "false"
  N8N_SMTP_SENDER: "admin@justindesio.com"
