apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: chatwoot-database
  namespace: chatwoot
spec:
  # "standard" flavour bundles the pgvector extension that Chatwoot requires.
  imageName: ghcr.io/cloudnative-pg/postgresql:17.5-standard-bookworm
  instances: 2

  primaryUpdateStrategy: unsupervised

  monitoring:
    enablePodMonitor: true

  # pg_stat_statements (declared by Chatwoot's schema) must be preloaded.
  postgresql:
    shared_preload_libraries:
      - pg_stat_statements

  bootstrap:
    initdb:
      database: chatwoot
      owner: chatwoot
      # Pre-create as superuser the non-trusted extensions Chatwoot's schema
      # declares (vector, pg_stat_statements); the app user can't CREATE them.
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS vector;
        - CREATE EXTENSION IF NOT EXISTS pg_stat_statements;
        - CREATE EXTENSION IF NOT EXISTS pg_trgm;
        - CREATE EXTENSION IF NOT EXISTS pgcrypto;

  storage:
    size: 10Gi
    storageClass: local-path

  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: required
