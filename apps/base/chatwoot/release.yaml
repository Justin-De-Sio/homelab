apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: chatwoot
  namespace: chatwoot
spec:
  interval: 30m
  chart:
    spec:
      chart: chatwoot
      version: "2.0.23"
      sourceRef:
        kind: HelmRepository
        name: chatwoot
        namespace: chatwoot
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  # The CloudNativePG cluster auto-generates the application password and stores
  # it in the "chatwoot-database-app" secret. Pull that value straight into the
  # chart instead of hardcoding a password (no chicken-and-egg).
  valuesFrom:
    - kind: Secret
      name: chatwoot-redis-auth
      valuesKey: password
      targetPath: redis.auth.password
  values:
    image:
      repository: chatwoot/chatwoot
      tag: v4.14.0
      pullPolicy: IfNotPresent

    hooks:
      migrate:
        hookAnnotation: "pre-install,pre-upgrade"

    # SECRET_KEY_BASE (+ optional SMTP_*) come from a SOPS-encrypted secret
    # supplied by each overlay.
    existingEnvSecret: chatwoot-secret

    env:
      INSTALLATION_ENV: helm
      RAILS_ENV: production
      NODE_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      # Public URL — overridden per environment (prod value lives here).
      FRONTEND_URL: "https://chat.990prep.com"
      # TLS is terminated at Cloudflare; the tunnel forwards plain HTTP to the
      # pod, so let Cloudflare enforce HTTPS to avoid a redirect loop.
      FORCE_SSL: "false"
      # Support desk: no public self-service signup.
      ENABLE_ACCOUNT_SIGNUP: "false"

    # --- External PostgreSQL (CloudNativePG) ---
    postgresql:
      enabled: false
      postgresqlHost: chatwoot-database-rw
      postgresqlPort: 5432
      auth:
        username: chatwoot
        database: chatwoot
        # Read the password live from the CNPG-managed secret (single source of
        # truth), so a cluster rebuild that rotates it never desyncs the app.
        existingSecret: chatwoot-database-app
        secretKeys:
          adminPasswordKey: password

    # --- Bundled Redis (single standalone node, internal only) ---
    redis:
      enabled: true
      architecture: standalone
      auth:
        enabled: true
      master:
        persistence:
          enabled: true
          storageClass: local-path
          size: 2Gi

    web:
      replicaCount: 1
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 1Gi

    worker:
      replicaCount: 1
      resources:
        requests:
          cpu: 100m
          memory: 384Mi
        limits:
          memory: 768Mi

    # Chart key is "services" (plural); the Cloudflare Tunnel hits this service
    # on :80, forwarded to the Puma container on 3000.
    services:
      name: chatwoot
      type: ClusterIP
      internalPort: 80
      targetPort: 3000

    # Exposed via Cloudflare Tunnel (dashboard-managed), not a k8s Ingress.
    ingress:
      enabled: false
