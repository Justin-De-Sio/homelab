apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  interval: 30m
  chart:
    spec:
      chart: nextcloud
      version: "6.6.10"
      sourceRef:
        kind: HelmRepository
        name: nextcloud
        namespace: nextcloud
      interval: 12h
  values:
    image:
      tag: "29.0.11-apache"
    
    # Enable ingress for external access
    ingress:
      enabled: true
      className: "nginx"
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
        nginx.ingress.kubernetes.io/proxy-body-size: "4G"
        nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
      hosts:
        - host: nextcloud.justindesio.com
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: nextcloud-tls
          hosts:
            - nextcloud.justindesio.com
    
    # Nextcloud configuration
    nextcloud:
      host: nextcloud.justindesio.com
      existingSecret:
        enabled: true
        secretName: nextcloud-admin
        usernameKey: username
        passwordKey: password
        
      # Configure for your domain
      configs:
        general.config.php: |-
          <?php
          $CONFIG = array (
            'trusted_domains' => array (
              'nextcloud.justindesio.com',
            ),
            'overwrite.cli.url' => 'https://nextcloud.justindesio.com',
            'overwriteprotocol' => 'https',
            'default_phone_region' => 'US',
            'maintenance_window_start' => 1,
            'memories.db.triggers' => false,
            'enabledPreviewProviders' => array (
              'OC\\Preview\\PNG',
              'OC\\Preview\\JPEG',
              'OC\\Preview\\GIF',
              'OC\\Preview\\WebP',
              'OC\\Preview\\Movie',
              'OC\\Preview\\MP3',
              'OC\\Preview\\TXT',
              'OC\\Preview\\MarkDown',
            ),
            'preview_max_x' => 1024,
            'preview_max_y' => 768,
            'jpeg_quality' => 60,
          );
    
    # Internal database for simplicity (PostgreSQL would be better for production)
    internalDatabase:
      enabled: true
      name: nextcloud
    
    # Disable external database
    externalDatabase:
      enabled: false
    
    # PostgreSQL disabled for minimalist setup
    postgresql:
      enabled: false
    
    # Redis disabled for minimalist setup  
    redis:
      enabled: false
    
    # Cronjob configuration
    cronjob:
      enabled: true
      schedule: "*/5 * * * *"
    
    # Persistence
    persistence:
      enabled: true
      size: 8Gi
      storageClass: ""
      accessMode: ReadWriteOnce
    
    # Resource limits for minimalist setup
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    
    # Security context
    securityContext:
      runAsUser: 33
      runAsGroup: 33
      runAsNonRoot: true
      readOnlyRootFilesystem: false
    
    # Probes - RELAXED for first-time setup
    livenessProbe:
      enabled: true
      initialDelaySeconds: 300      # Wait 5 minutes before first check
      periodSeconds: 60            # Check every minute
      timeoutSeconds: 30           # 30 second timeout
      successThreshold: 1
      failureThreshold: 5          # Allow 5 failures before restart
    
    readinessProbe:
      enabled: true
      initialDelaySeconds: 120     # Wait 2 minutes
      periodSeconds: 30           # Check every 30 seconds
      timeoutSeconds: 10
      successThreshold: 1
      failureThreshold: 10        # Allow 10 failures
    
    # Startup probe - VERY generous for first-time setup
    startupProbe:
      enabled: true
      initialDelaySeconds: 60     # Wait 1 minute before starting
      periodSeconds: 30           # Check every 30 seconds
      timeoutSeconds: 10         
      successThreshold: 1
      failureThreshold: 40        # 40 * 30s = 20 minutes total startup time 